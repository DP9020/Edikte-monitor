name: Edikte Monitor

on:
  schedule:
    - cron: "30 7 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run
            - name: Show Telegram Chat IDs (temporaer)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          echo "=== Telegram getUpdates ==="
          curl -s "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/getUpdates" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          seen = set()
          for u in data.get('result', []):
              msg = u.get('message') or u.get('my_chat_member', {})
              chat = msg.get('chat', {})
              cid = chat.get('id')
              name = chat.get('first_name','') + ' ' + chat.get('last_name','')
              if cid and cid not in seen:
                  seen.add(cid)
                  print(f'Chat-ID: {cid} | Name: {name.strip()}')
          if not seen:
              print('Keine Eintraege gefunden – bitte /start im Bot schreiben')
          "
          echo "==========================="
          
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          BRIEF_ONLY: ${{ github.event.schedule == '*/10 * * * *' && 'true' || 'false' }}
        run: |
          python main.py
