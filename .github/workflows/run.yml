name: Edikte Monitor

on:
  schedule:
    - cron: "30 7 * * 1-5"
    - cron: "0 9 * * 1-5"
    - cron: "0 12 * * 1-5"
    - cron: "0 15 * * 1-5"
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      brief_only:
        description: "Nur Brief-Erstellung (kein Scraping)"
        required: false
        default: "false"

jobs:

  # Vollständiger Run: Scraping + Gutachten + Briefe + Benjamin
  full-run:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 7 * * 1-5' ||
      github.event.schedule == '0 9 * * 1-5'  ||
      github.event.schedule == '0 12 * * 1-5' ||
      github.event.schedule == '0 15 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (vollständig)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          BRIEF_ONLY: "false"
        run: |
          python main.py

  # BRIEF_ONLY: alle 10 Minuten – nur Status-Sync + Brief-Erstellung
  brief-only:
    if: github.event.schedule == '*/10 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (Brief-Only)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          BRIEF_ONLY: "true"
        run: |
          python main.py
