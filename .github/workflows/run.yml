name: Edikte Monitor

on:
  schedule:
    - cron: "30 5 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "0 13 * * 1-5"
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      modus:
        description: "Modus: full | brief | gdrive"
        required: false
        default: "full"

jobs:

  # Vollständiger Run: Scraping + Gutachten-Analyse
  full-run:
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.modus == 'full' || github.event.inputs.modus == '')) ||
      github.event.schedule == '30 5 * * 1-5' ||
      github.event.schedule == '0 7 * * 1-5'  ||
      github.event.schedule == '0 10 * * 1-5' ||
      github.event.schedule == '0 13 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (vollständig)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          TELEGRAM_CHAT_ID_CHRISTOPHER: ${{ secrets.TELEGRAM_CHAT_ID_CHRISTOPHER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          BRIEF_ONLY: "false"
        run: |
          python main.py

  # BRIEF_ONLY: alle 10 Minuten – nur Status-Sync + Brief-Erstellung
  brief-only:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'brief') ||
      github.event.schedule == '*/10 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (Brief-Only)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          TELEGRAM_CHAT_ID_CHRISTOPHER: ${{ secrets.TELEGRAM_CHAT_ID_CHRISTOPHER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          BRIEF_ONLY: "true"
        run: |
          python main.py

  # GDRIVE_ONLY: alle 10 Minuten – Google Drive Sync für Gelb-Einträge
  gdrive-sync:
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'gdrive') ||
      github.event.schedule == '*/10 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (GDrive-Sync)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GDRIVE_ONLY: "true"
        run: |
          python main.py
