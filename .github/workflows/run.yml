name: Edikte Monitor

on:
  schedule:
    # ── Full-Run (Scraping + Gutachten): Mo-Fr 05:30 / 07:00 / 10:00 / 13:00 UTC ──
    - cron: "30 5 * * 1-5"
    - cron: "0 7 * * 1-5"
    - cron: "0 10 * * 1-5"
    - cron: "0 13 * * 1-5"
    # ── Brief-Only: alle 10 Minuten ──
    - cron: "*/10 * * * *"
    # ── GDrive-Sync: alle 30 Minuten ──
    - cron: "*/30 * * * *"
    # ── Cleanup-Duplikate: Dienstag 03:00 UTC (war Mo 04:00 – Kollision mit full-run/wochenbericht entflochten) ──
    - cron: "0 3 * * 2"
    # ── Wochenbericht: Mo 08:15 UTC (nach 07:00-full-run-Slot, eigene concurrency-group) ──
    - cron: "15 8 * * 1"
  workflow_dispatch:
    inputs:
      modus:
        description: "Modus: full | brief | gdrive | cleanup | telegram-test | wochenbericht | sendgrid-check | brevo-check | mail-testsend"
        required: false
        default: "full"

# Default-Permissions auf read-only setzen. Workflow muss nichts schreiben.
permissions:
  contents: read

jobs:

  # Vollständiger Run: Scraping + Gutachten-Analyse
  full-run:
    timeout-minutes: 60
    concurrency:
      group: edikte-notion-write
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.modus == 'full' || github.event.inputs.modus == '')) ||
      github.event.schedule == '30 5 * * 1-5' ||
      github.event.schedule == '0 7 * * 1-5'  ||
      github.event.schedule == '0 10 * * 1-5' ||
      github.event.schedule == '0 13 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (vollständig)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          TELEGRAM_CHAT_ID_CHRISTOPHER: ${{ secrets.TELEGRAM_CHAT_ID_CHRISTOPHER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          BRIEF_ONLY: "false"
        run: |
          python main.py
      - name: Fehler-Benachrichtigung (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_NAME: "full-run"
        run: |
          python3 .github/workflows/_telegram_failure.py

  # BRIEF_ONLY: alle 10 Minuten – nur Status-Sync + Brief-Erstellung
  brief-only:
    timeout-minutes: 8
    concurrency:
      # Eigene Group: brief-only darf seinen Vorgänger abbrechen (frische Daten),
      # aber NICHT andere Notion-Schreibe-Jobs (full-run, gdrive-sync, cleanup,
      # dedup). Race-Conditions sind unkritisch, weil Brief-Erstellung idempotent
      # ist (siehe `Brief erstellt am`-Check in main.py erstelle_briefe_fuer_relevante).
      group: edikte-brief-only
      cancel-in-progress: true
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'brief') ||
      github.event.schedule == '*/10 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (Brief-Only)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          TELEGRAM_CHAT_ID_CHRISTOPHER: ${{ secrets.TELEGRAM_CHAT_ID_CHRISTOPHER }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          BRIEF_ONLY: "true"
        run: |
          python main.py
      - name: Fehler-Benachrichtigung (Telegram)
        # Nur bei echtem Fehler, nicht bei concurrency-cancel (das ist normal)
        if: failure() && !cancelled()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_NAME: "brief-only"
        run: |
          python3 .github/workflows/_telegram_failure.py

  # GDRIVE_ONLY: alle 30 Minuten – Google Drive Sync für Gelb-Einträge
  gdrive-sync:
    timeout-minutes: 15
    concurrency:
      group: edikte-notion-write
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'gdrive') ||
      github.event.schedule == '*/30 * * * *'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run (GDrive-Sync)
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GDRIVE_ONLY: "true"
        run: |
          python main.py
      - name: Fehler-Benachrichtigung (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_NAME: "gdrive-sync"
        run: |
          python3 .github/workflows/_telegram_failure.py

  # TELEGRAM-TEST: Testnachricht an alle Betreuer senden
  telegram-test:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'telegram-test'
    runs-on: ubuntu-latest
    steps:
      - name: Testnachricht senden
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          TELEGRAM_CHAT_ID_CHRISTOPHER: ${{ secrets.TELEGRAM_CHAT_ID_CHRISTOPHER }}
        run: |
          python3 -c "
          import urllib.request, json, os
          token = os.environ['TELEGRAM_BOT_TOKEN']
          url = f'https://api.telegram.org/bot{token}/sendMessage'
          ids = {
              'Friedrich': os.environ.get('TELEGRAM_CHAT_ID', ''),
              'Benjamin': os.environ.get('TELEGRAM_CHAT_ID_BENJAMIN', ''),
              'Christopher': os.environ.get('TELEGRAM_CHAT_ID_CHRISTOPHER', ''),
          }
          for name, cid in ids.items():
              if not cid:
                  print(f'SKIP {name}: keine Chat-ID gesetzt')
                  continue
              try:
                  data = json.dumps({'chat_id': cid, 'text': f'Testnachricht Edikte-Monitor an {name}'}).encode()
                  req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
                  with urllib.request.urlopen(req, timeout=10) as r:
                      print(f'OK {name} ({cid}): {r.status}')
              except Exception as e:
                  print(f'FEHLER {name} ({cid}): {e}')
          "

  # SENDGRID-CHECK: API-Key + Sender Identity diagnostizieren (manuell)
  sendgrid-check:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'sendgrid-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Healthcheck
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
        run: |
          python3 scripts/sendgrid_healthcheck.py

  # BREVO-CHECK: SMTP-Login pruefen ohne Mail zu senden (manuell)
  brevo-check:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'brevo-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Healthcheck
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
        run: |
          python3 scripts/brevo_healthcheck.py

  # MAIL-TESTSEND: schickt eine Test-Mail an SMTP_USER (verbraucht 1 Credit)
  mail-testsend:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'mail-testsend'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Test-Mail senden
        env:
          BREVO_SMTP_KEY: ${{ secrets.BREVO_SMTP_KEY }}
          BREVO_SMTP_LOGIN: ${{ secrets.BREVO_SMTP_LOGIN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
        run: |
          python3 scripts/mail_testsend.py

  # CLEANUP: Duplikate in Notion-Datenbank archivieren (manuell + jeden Dienstag 03:00 UTC)
  cleanup-duplikate:
    timeout-minutes: 15
    concurrency:
      group: edikte-notion-write
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'cleanup') ||
      github.event.schedule == '0 3 * * 2'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Duplikate bereinigen
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          python cleanup_duplikate.py --apply
      - name: Fehler-Benachrichtigung (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_NAME: "cleanup-duplikate"
        run: |
          python3 .github/workflows/_telegram_failure.py

  # WOCHENBERICHT: Wöchentliche Zusammenfassung (Mo 08:15 UTC = 10:15 Wien Sommer / 09:15 Winter).
  # Eigene Concurrency-Gruppe, damit ein parallel startender brief-only mit
  # cancel-in-progress:true den Bericht nicht abschießen kann. Der Job ist
  # read-only auf Notion (load_all_pages + Aggregation) und sendet nur
  # Telegram – Parallel-Lauf zu Schreib-Jobs ist sicher.
  wochenbericht:
    timeout-minutes: 15
    concurrency:
      group: edikte-wochenbericht
      cancel-in-progress: false
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.modus == 'wochenbericht') ||
      github.event.schedule == '15 8 * * 1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Wochenbericht senden
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_CHAT_ID_BENJAMIN: ${{ secrets.TELEGRAM_CHAT_ID_BENJAMIN }}
          TELEGRAM_CHAT_ID_CHRISTOPHER: ${{ secrets.TELEGRAM_CHAT_ID_CHRISTOPHER }}
          WOCHENBERICHT: "true"
        run: |
          python main.py
      - name: Fehler-Benachrichtigung (Telegram)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_NAME: "wochenbericht"
        run: |
          python3 .github/workflows/_telegram_failure.py

  # NOTIFY-FAILURE: Workflow-level Safety-Net.
  # Die per-Job Failure-Steps (`if: failure()`) laufen NICHT, wenn ein Job in der
  # Setup-Phase abgebrochen wird (z.B. durch Concurrency-Cancel oder Job-Timeout
  # im "Set up job"-Schritt). Dieser Job läuft am Ende immer und alarmiert dann.
  # brief-only-Cancels werden bewusst ignoriert (das ist erwartet: neuer Tick
  # ersetzt obsoleten Vorgänger).
  notify-failure:
    needs: [full-run, brief-only, gdrive-sync, cleanup-duplikate, wochenbericht]
    if: |
      always() && (
        contains(needs.*.result, 'failure') ||
        needs.full-run.result == 'cancelled' ||
        needs.gdrive-sync.result == 'cancelled' ||
        needs.cleanup-duplikate.result == 'cancelled' ||
        needs.wochenbericht.result == 'cancelled'
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send Telegram failure alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          FULL_RUN_RESULT: ${{ needs.full-run.result }}
          BRIEF_ONLY_RESULT: ${{ needs.brief-only.result }}
          GDRIVE_SYNC_RESULT: ${{ needs.gdrive-sync.result }}
          CLEANUP_RESULT: ${{ needs.cleanup-duplikate.result }}
          WOCHENBERICHT_RESULT: ${{ needs.wochenbericht.result }}
        run: |
          python3 .github/workflows/_telegram_workflow_failure.py
