name: Dedup Tief (alle Strategien)

# Tiefe Duplikat-Bereinigung über alle aktiven Pages via:
#   - Hash-ID-Overlap (kumulatives Feld)
#   - Normalisierte Adresse + PLZ
#   - Normalisierte Adresse + Bundesland
# Mit harten Safety-Checks bevor archiviert wird.

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "true = tatsächlich archivieren | false = Dry-Run"
        required: false
        default: "false"

jobs:
  dedup-tief:
    timeout-minutes: 20
    concurrency:
      group: edikte-notion-write
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Tiefe Duplikat-Bereinigung
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          if [ "${{ github.event.inputs.apply }}" = "true" ]; then
            echo "▶ Modus: APPLY (echte Archivierung)"
            python dedup_tief.py --apply
          else
            echo "▶ Modus: DRY-RUN"
            python dedup_tief.py
          fi
